name: Run Operations Script

# 運用スクリプト汎用ワークフロー
# check-master-data, fix-stuck-documents 等のFirestoreアクセスが必要なスクリプトを
# GitHub Actions経由で実行する。ローカルADC不要。
#
# 環境別SA: GCP_SA_KEY_KANAMEONE / GCP_SA_KEY_DEV / GCP_SA_KEY(cocoro、将来GCP_SA_KEY_COCOROに移行)

on:
  # 注: workflow_dispatch.inputs は GitHub Actions の仕様上最大 10 個まで定義可能。
  # 現在 9 個使用中（残り 1）。スクリプト固有の引数追加で上限超過する場合は、
  # 共通 inputs を JSON 文字列に統合する設計（例: script_args_json）への移行を検討。
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - kanameone
          - cocoro
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - check-master-data
          - check-master-data --fix
          - fix-stuck-documents --dry-run
          - fix-stuck-documents
          - fix-stuck-documents --include-errors --dry-run
          - fix-stuck-documents --include-errors
          - fix-stuck-documents --doc-id --dry-run
          - fix-stuck-documents --doc-id
          - backfill-display-filename --dry-run
          - backfill-display-filename
          - backfill-display-filename --force
          - cleanup-duplicates
          - cleanup-duplicates --execute
          - force-reindex --all-drift
          - force-reindex --all-drift --execute
          - force-reindex --doc-id
          - force-reindex --doc-id --execute
          - investigate-office-duplicate
          - cleanup-office-name --dry-run
          - cleanup-office-name --execute
          - inspect-document --file-name
          - inspect-document --file-name --include-related
          - inspect-document --doc-id
          - inspect-document --doc-id --include-related
          - audit-storage-mismatch
          - audit-storage-mismatch --no-orphans
          - audit-storage-mismatch --no-collisions
          - classify-collision-docs
          - setup-collision-fixture --dev
          - setup-collision-fixture --dev --cleanup
          - execute-collision-migration --dry-run
          - execute-collision-migration --execute
      doc_id:
        description: 'Document ID (required when script contains --doc-id; ignored otherwise)'
        required: false
        type: string
        default: ''
      file_name:
        description: 'fileName (required when script contains "inspect-document --file-name"; ignored otherwise)'
        required: false
        type: string
        default: ''
      name1:
        description: 'Office name 1 (required for investigate-office-duplicate; ignored otherwise)'
        required: false
        type: string
        default: ''
      name2:
        description: 'Office name 2 (optional, for paired comparison; e.g. duplicate candidate variant like the trailing-zero suffix case)'
        required: false
        type: string
        default: ''
      from_name:
        description: 'cleanup-office-name: 書き換え元の事業所名（例: ケア21上飯田0）'
        required: false
        type: string
        default: ''
      to_name:
        description: 'cleanup-office-name: 書き換え先の事業所名（例: ケア21上飯田）'
        required: false
        type: string
        default: ''
      delete_from_master:
        description: 'cleanup-office-name: 旧マスターを削除するか（true で削除）'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      expected_count:
        description: 'cleanup-office-name: 影響件数の事前確認（数値；省略時はチェック無効、指定時は不一致で中断）'
        required: false
        type: string
        default: ''
      exec_args_json:
        description: 'execute-collision-migration: JSON {"planRunId":"<classify run id>","approvedOperationIds":["op-0001",...]}'
        required: false
        type: string
        default: ''

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (firebase-admin)
        working-directory: ./functions
        run: npm ci

      - name: Build functions (for scripts that require compiled lib/ — e.g. force-reindex)
        working-directory: ./functions
        run: npm run build

      - name: Install scripts devDependencies (ts-node for .ts scripts)
        working-directory: ./scripts
        run: npm install --no-audit --no-fund

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: |-
            ${{ github.event.inputs.environment == 'kanameone' && secrets.GCP_SA_KEY_KANAMEONE ||
                github.event.inputs.environment == 'dev' && secrets.GCP_SA_KEY_DEV ||
                secrets.GCP_SA_KEY }}

      - name: Resolve project ID and storage bucket
        id: resolve
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          PROJECT_ID=$(node scripts/helpers/firebaserc-helper.js get-project "$ENVIRONMENT")
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved project_id: $ENVIRONMENT → $PROJECT_ID"

          # CLAUDE.md「Storage バケット名」: .appspot.com / .firebasestorage.app 混在で
          # projectId からの推測禁止。scripts/clients/<env>.env の STORAGE_BUCKET を抽出する。
          # ENVIRONMENT は workflow_dispatch.choice で固定 enum (dev / kanameone / cocoro)、
          # path traversal リスクなし。
          ENV_FILE="scripts/clients/${ENVIRONMENT}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: $ENV_FILE not found" >&2
            exit 1
          fi
          STORAGE_BUCKET=$(grep -E '^STORAGE_BUCKET=' "$ENV_FILE" | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
          if [ -z "$STORAGE_BUCKET" ]; then
            echo "ERROR: STORAGE_BUCKET not found in $ENV_FILE" >&2
            exit 1
          fi
          echo "storage_bucket=$STORAGE_BUCKET" >> "$GITHUB_OUTPUT"
          echo "Resolved storage_bucket: $STORAGE_BUCKET"

      - name: Parse script and args
        id: parse
        env:
          INPUT: ${{ github.event.inputs.script }}
          DOC_ID: ${{ github.event.inputs.doc_id }}
        run: |
          set -euo pipefail
          SCRIPT_NAME=$(echo "$INPUT" | awk '{print $1}')
          SCRIPT_ARGS=$(echo "$INPUT" | sed 's/^[^ ]* *//')
          if [ "$SCRIPT_ARGS" = "$SCRIPT_NAME" ]; then
            SCRIPT_ARGS=""
          fi

          # --doc-id 指定スクリプトには doc_id 入力を必須化
          if echo "$SCRIPT_ARGS" | grep -q -- '--doc-id'; then
            if [ -z "$DOC_ID" ]; then
              echo "ERROR: doc_id input is required when script contains --doc-id" >&2
              exit 1
            fi
            # ドキュメントIDは英数字のみ許可（コマンドインジェクション対策）
            if ! echo "$DOC_ID" | grep -qE '^[A-Za-z0-9_-]+$'; then
              echo "ERROR: doc_id must contain only alphanumeric, underscore, hyphen characters" >&2
              exit 1
            fi
            SCRIPT_ARGS=$(echo "$SCRIPT_ARGS" | sed "s/--doc-id/--doc-id $DOC_ID/")
          fi

          echo "script_name=$SCRIPT_NAME" >> "$GITHUB_OUTPUT"
          echo "script_args=$SCRIPT_ARGS" >> "$GITHUB_OUTPUT"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"

      - name: Parse execute-collision-migration args
        # Issue #432 PR-C2-execution: exec_args_json から planRunId と
        # approvedOperationIds を抽出する。後段の Download artifact + Generate
        # approval JSON で参照。
        id: parse_exec
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        env:
          EXEC_ARGS_JSON: ${{ github.event.inputs.exec_args_json }}
          SCRIPT_NAME: ${{ steps.parse.outputs.script_name }}
        run: |
          set -euo pipefail
          if [ -z "$EXEC_ARGS_JSON" ]; then
            echo "ERROR: exec_args_json is required when script is execute-collision-migration" >&2
            exit 1
          fi
          # JSON validate + 抽出 (jq は ubuntu-latest に標準搭載)
          if ! echo "$EXEC_ARGS_JSON" | jq empty 2>/dev/null; then
            echo "ERROR: exec_args_json is not valid JSON" >&2
            exit 1
          fi
          PLAN_RUN_ID=$(echo "$EXEC_ARGS_JSON" | jq -r '.planRunId // empty')
          OPERATION_IDS=$(echo "$EXEC_ARGS_JSON" | jq -r '.approvedOperationIds // empty | join(",")')
          if [ -z "$PLAN_RUN_ID" ] || [ -z "$OPERATION_IDS" ]; then
            echo "ERROR: exec_args_json must contain planRunId (string) and approvedOperationIds (array)" >&2
            exit 1
          fi
          # planRunId は GitHub Actions run id (数字のみ) — path traversal / injection 防止
          if ! echo "$PLAN_RUN_ID" | grep -qE '^[0-9]+$'; then
            echo "ERROR: planRunId must be a numeric run id (got: $PLAN_RUN_ID)" >&2
            exit 1
          fi
          # operationId は op-NNNN 形式のみ許可
          if ! echo "$OPERATION_IDS" | grep -qE '^op-[0-9]+(,op-[0-9]+)*$'; then
            echo "ERROR: approvedOperationIds must each match ^op-[0-9]+$ (got: $OPERATION_IDS)" >&2
            exit 1
          fi
          echo "plan_run_id=$PLAN_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "operation_ids_csv=$OPERATION_IDS" >> "$GITHUB_OUTPUT"
          echo "Plan run id: $PLAN_RUN_ID"
          echo "Approved operation ids: $OPERATION_IDS"

      - name: Download classify-collision-docs plan artifact
        # exec_args_json.planRunId で指定された前段 classify run の plan-output.json を取得。
        # Artifact 名は upload 側 (上記 Upload step) と一致させる。
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        uses: actions/download-artifact@v4
        with:
          name: classify-collision-docs-plan-${{ github.event.inputs.environment }}-${{ steps.parse_exec.outputs.plan_run_id }}
          path: ${{ github.workspace }}/.exec-plan
          run-id: ${{ steps.parse_exec.outputs.plan_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate approval JSON from plan + approved operation ids
        # plan-output.json の operations 配列から approvedOperationIds に該当する op を
        # 抽出し、その planId + opIds + (sourcePath/destPath を gs://bucket/path で展開) を
        # approval.json に書き出す。execute-collision-migration.ts の Gate 1-3 を満たす形式。
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        env:
          OPERATION_IDS_CSV: ${{ steps.parse_exec.outputs.operation_ids_csv }}
          STORAGE_BUCKET: ${{ steps.resolve.outputs.storage_bucket }}
        run: |
          set -euo pipefail
          PLAN_FILE="${GITHUB_WORKSPACE}/.exec-plan/plan-output.json"
          APPROVAL_FILE="${GITHUB_WORKSPACE}/.exec-plan/approval.json"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "ERROR: plan-output.json not found at $PLAN_FILE" >&2
            exit 1
          fi
          # CSV → JSON array of strings
          OP_IDS_JSON=$(echo "$OPERATION_IDS_CSV" | jq -R 'split(",")')
          # planId は plan から、approvedPaths は該当 op の sourcePath/destPath を gs:// 形式で集合化
          jq --argjson opids "$OP_IDS_JSON" --arg bucket "$STORAGE_BUCKET" '
            {
              planId: .planId,
              approvedOperationIds: $opids,
              approvedPaths: [
                .operations[]
                | select(.operationId as $id | $opids | index($id))
                | (.sourcePath, .destPath)
                | select(. != null and . != "")
                | "gs://\($bucket)/\(.)"
              ] | unique
            }
          ' "$PLAN_FILE" > "$APPROVAL_FILE"
          # 確認用 (path をログに出すことで監査証跡を残す)
          echo "=== Generated approval.json ==="
          cat "$APPROVAL_FILE"
          echo "==============================="
          # approvedOperationIds の数 = 入力 opId 数 を検証 (plan に存在しない opId は警告)
          INPUT_COUNT=$(echo "$OP_IDS_JSON" | jq 'length')
          MATCHED_COUNT=$(jq '[.operations[] | select(.operationId as $id | ('"$OP_IDS_JSON"' | index($id))) ] | length' "$PLAN_FILE")
          if [ "$INPUT_COUNT" != "$MATCHED_COUNT" ]; then
            echo "ERROR: $INPUT_COUNT operation ids requested but only $MATCHED_COUNT matched in plan" >&2
            exit 1
          fi

      - name: Run script
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          PROJECT_ID: ${{ steps.resolve.outputs.project_id }}
          SCRIPT_NAME: ${{ steps.parse.outputs.script_name }}
          SCRIPT_ARGS: ${{ steps.parse.outputs.script_args }}
          NAME1: ${{ github.event.inputs.name1 }}
          NAME2: ${{ github.event.inputs.name2 }}
          FROM_NAME: ${{ github.event.inputs.from_name }}
          TO_NAME: ${{ github.event.inputs.to_name }}
          DELETE_FROM_MASTER: ${{ github.event.inputs.delete_from_master }}
          EXPECTED_COUNT: ${{ github.event.inputs.expected_count }}
          FILE_NAME: ${{ github.event.inputs.file_name }}
          DOC_ID: ${{ github.event.inputs.doc_id }}
          STORAGE_BUCKET: ${{ steps.resolve.outputs.storage_bucket }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: PROJECT_ID is empty (failed to resolve from .firebaserc)" >&2
            exit 1
          fi
          echo "=== Operations Script ==="
          echo "Environment: $ENVIRONMENT"
          echo "Project ID: $PROJECT_ID"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"
          echo "========================="

          if [ "$SCRIPT_NAME" = "investigate-office-duplicate" ]; then
            # 空文字 / 空白のみの NAME1 を弾く（trim せずに非空白文字の存在チェック）
            if [[ ! "$NAME1" =~ [^[:space:]] ]]; then
              echo "ERROR: name1 must contain non-whitespace characters for investigate-office-duplicate" >&2
              exit 1
            fi
            ARGS=( --name "$NAME1" )
            if [ -n "$NAME2" ]; then ARGS+=( --name "$NAME2" ); fi
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "cleanup-office-name" ]; then
            if [[ ! "$FROM_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: from_name must contain non-whitespace characters" >&2
              exit 1
            fi
            if [[ ! "$TO_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: to_name must contain non-whitespace characters" >&2
              exit 1
            fi
            ARGS=( --from "$FROM_NAME" --to "$TO_NAME" )
            if [ "$DELETE_FROM_MASTER" = "true" ]; then
              ARGS+=( --delete-from-master )
            fi
            if [ -n "$EXPECTED_COUNT" ]; then
              if ! [[ "$EXPECTED_COUNT" =~ ^[0-9]+$ ]]; then
                echo "ERROR: expected_count must be a non-negative integer (got: \"$EXPECTED_COUNT\")" >&2
                exit 1
              fi
              ARGS+=( --expected-count "$EXPECTED_COUNT" )
            fi
            # SCRIPT_ARGS には --dry-run / --execute が入っている。read -ra で word splitting して array に追加
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "execute-collision-migration" ]; then
            # Issue #432 PR-C2-execution: plan + approval を前段 step で artifact 取得 + 生成。
            # SCRIPT_ARGS は workflow_dispatch の choice に応じて "--dry-run" or "--execute"。
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              npx ts-node "${SCRIPT_NAME}.ts" \
                --plan "${GITHUB_WORKSPACE}/.exec-plan/plan-output.json" \
                --approval "${GITHUB_WORKSPACE}/.exec-plan/approval.json" \
                $SCRIPT_ARGS
          elif [ "$SCRIPT_NAME" = "backfill-display-filename" ] || \
               [ "$SCRIPT_NAME" = "classify-collision-docs" ] || \
               [ "$SCRIPT_NAME" = "setup-collision-fixture" ]; then
            # Issue #432 PR-C 系 script は scripts/lib/* (TypeScript) に依存するため
            # ts-node 経由で実行。STORAGE_BUCKET は resolve step で env 化済。
            EXTRA_ARGS=""
            if [ "$SCRIPT_NAME" = "classify-collision-docs" ]; then
              # ログマスキングで `{` が `***` に置換されるため、plan JSON を
              # ファイル出力 → upload-artifact で取得する経路を必須化。
              # workflow_dispatch の choice には --out を含めず、ここで強制付与する。
              EXTRA_ARGS="--out ${GITHUB_WORKSPACE}/scripts/plan-output.json"
            fi
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              npx ts-node "${SCRIPT_NAME}.ts" $SCRIPT_ARGS $EXTRA_ARGS
          elif [ "$SCRIPT_NAME" = "inspect-document" ]; then
            # SCRIPT_ARGS は workflow_dispatch で選んだ "--file-name" / "--doc-id" / "... --include-related"
            # FILE_NAME / DOC_ID は env 経由で受け取り、配列に積んで execv 渡しでシェル展開を経由しない
            ARGS=()
            INCLUDE_RELATED=0
            if echo "$SCRIPT_ARGS" | grep -q -- '--include-related'; then
              INCLUDE_RELATED=1
            fi
            if echo "$SCRIPT_ARGS" | grep -q -- '--file-name'; then
              if [[ ! "$FILE_NAME" =~ [^[:space:]] ]]; then
                echo "ERROR: file_name input is required when script contains --file-name" >&2
                exit 1
              fi
              ARGS+=( --file-name "$FILE_NAME" )
            fi
            if echo "$SCRIPT_ARGS" | grep -q -- '--doc-id'; then
              # parse 段階で DOC_ID validation 済み (英数字_-)、SCRIPT_ARGS 側は "--doc-id <DOC_ID>" の形
              # ARGS には DOC_ID を直接入れる（execv 経由でシェル展開されない）
              if [ -z "${DOC_ID:-}" ]; then
                echo "ERROR: doc_id input is required when script contains --doc-id" >&2
                exit 1
              fi
              ARGS+=( --doc-id "$DOC_ID" )
            fi
            if [ "$INCLUDE_RELATED" = "1" ]; then
              ARGS+=( --include-related )
            fi
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          else
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" $SCRIPT_ARGS
          fi

      - name: Upload classify-collision-docs plan artifact
        # Issue #432 PR-C2-execution: log の secret masking で `{` → `***` 置換で plan JSON
        # を log から再構成できないため、artifact 経由で受け渡す。classify-collision-docs
        # 実行時のみ動作 (Run script step で `--out` を強制付与した出力ファイル)。
        if: ${{ github.event.inputs.script == 'classify-collision-docs' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: classify-collision-docs-plan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/plan-output.json
          if-no-files-found: warn
          retention-days: 30
