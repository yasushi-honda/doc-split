name: Run Operations Script

# 運用スクリプト汎用ワークフロー
# check-master-data, fix-stuck-documents 等のFirestoreアクセスが必要なスクリプトを
# GitHub Actions経由で実行する。ローカルADC不要。
#
# 環境別SA: GCP_SA_KEY_KANAMEONE / GCP_SA_KEY_DEV / GCP_SA_KEY(cocoro、将来GCP_SA_KEY_COCOROに移行)

on:
  # 注: workflow_dispatch.inputs は GitHub Actions の仕様上最大 10 個まで定義可能。
  # 現在 9 個使用中（残り 1）。スクリプト固有の引数追加で上限超過する場合は、
  # 共通 inputs を JSON 文字列に統合する設計（例: script_args_json）への移行を検討。
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - kanameone
          - cocoro
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - check-master-data
          - check-master-data --fix
          - fix-stuck-documents --dry-run
          - fix-stuck-documents
          - fix-stuck-documents --include-errors --dry-run
          - fix-stuck-documents --include-errors
          - fix-stuck-documents --doc-id --dry-run
          - fix-stuck-documents --doc-id
          - backfill-display-filename --dry-run
          - backfill-display-filename
          - backfill-display-filename --force
          - cleanup-duplicates
          - cleanup-duplicates --execute
          - force-reindex --all-drift
          - force-reindex --all-drift --execute
          - force-reindex --doc-id
          - force-reindex --doc-id --execute
          - investigate-office-duplicate
          - cleanup-office-name --dry-run
          - cleanup-office-name --execute
      doc_id:
        description: 'Document ID (required when script contains --doc-id; ignored otherwise)'
        required: false
        type: string
        default: ''
      name1:
        description: 'Office name 1 (required for investigate-office-duplicate; ignored otherwise)'
        required: false
        type: string
        default: ''
      name2:
        description: 'Office name 2 (optional, for paired comparison; e.g. duplicate candidate variant like the trailing-zero suffix case)'
        required: false
        type: string
        default: ''
      from_name:
        description: 'cleanup-office-name: 書き換え元の事業所名（例: ケア21上飯田0）'
        required: false
        type: string
        default: ''
      to_name:
        description: 'cleanup-office-name: 書き換え先の事業所名（例: ケア21上飯田）'
        required: false
        type: string
        default: ''
      delete_from_master:
        description: 'cleanup-office-name: 旧マスターを削除するか（true で削除）'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      expected_count:
        description: 'cleanup-office-name: 影響件数の事前確認（数値；省略時はチェック無効、指定時は不一致で中断）'
        required: false
        type: string
        default: ''

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (firebase-admin)
        working-directory: ./functions
        run: npm ci

      - name: Build functions (for scripts that require compiled lib/ — e.g. force-reindex)
        working-directory: ./functions
        run: npm run build

      - name: Install scripts devDependencies (ts-node for .ts scripts)
        working-directory: ./scripts
        run: npm install --no-audit --no-fund

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: |-
            ${{ github.event.inputs.environment == 'kanameone' && secrets.GCP_SA_KEY_KANAMEONE ||
                github.event.inputs.environment == 'dev' && secrets.GCP_SA_KEY_DEV ||
                secrets.GCP_SA_KEY }}

      - name: Resolve project ID from .firebaserc
        id: resolve
        run: |
          PROJECT_ID=$(node scripts/helpers/firebaserc-helper.js get-project "${{ github.event.inputs.environment }}")
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${{ github.event.inputs.environment }} → $PROJECT_ID"

      - name: Parse script and args
        id: parse
        env:
          INPUT: ${{ github.event.inputs.script }}
          DOC_ID: ${{ github.event.inputs.doc_id }}
        run: |
          set -euo pipefail
          SCRIPT_NAME=$(echo "$INPUT" | awk '{print $1}')
          SCRIPT_ARGS=$(echo "$INPUT" | sed 's/^[^ ]* *//')
          if [ "$SCRIPT_ARGS" = "$SCRIPT_NAME" ]; then
            SCRIPT_ARGS=""
          fi

          # --doc-id 指定スクリプトには doc_id 入力を必須化
          if echo "$SCRIPT_ARGS" | grep -q -- '--doc-id'; then
            if [ -z "$DOC_ID" ]; then
              echo "ERROR: doc_id input is required when script contains --doc-id" >&2
              exit 1
            fi
            # ドキュメントIDは英数字のみ許可（コマンドインジェクション対策）
            if ! echo "$DOC_ID" | grep -qE '^[A-Za-z0-9_-]+$'; then
              echo "ERROR: doc_id must contain only alphanumeric, underscore, hyphen characters" >&2
              exit 1
            fi
            SCRIPT_ARGS=$(echo "$SCRIPT_ARGS" | sed "s/--doc-id/--doc-id $DOC_ID/")
          fi

          echo "script_name=$SCRIPT_NAME" >> "$GITHUB_OUTPUT"
          echo "script_args=$SCRIPT_ARGS" >> "$GITHUB_OUTPUT"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"

      - name: Run script
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          PROJECT_ID: ${{ steps.resolve.outputs.project_id }}
          SCRIPT_NAME: ${{ steps.parse.outputs.script_name }}
          SCRIPT_ARGS: ${{ steps.parse.outputs.script_args }}
          NAME1: ${{ github.event.inputs.name1 }}
          NAME2: ${{ github.event.inputs.name2 }}
          FROM_NAME: ${{ github.event.inputs.from_name }}
          TO_NAME: ${{ github.event.inputs.to_name }}
          DELETE_FROM_MASTER: ${{ github.event.inputs.delete_from_master }}
          EXPECTED_COUNT: ${{ github.event.inputs.expected_count }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: PROJECT_ID is empty (failed to resolve from .firebaserc)" >&2
            exit 1
          fi
          echo "=== Operations Script ==="
          echo "Environment: $ENVIRONMENT"
          echo "Project ID: $PROJECT_ID"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"
          echo "========================="

          if [ "$SCRIPT_NAME" = "investigate-office-duplicate" ]; then
            # 空文字 / 空白のみの NAME1 を弾く（trim せずに非空白文字の存在チェック）
            if [[ ! "$NAME1" =~ [^[:space:]] ]]; then
              echo "ERROR: name1 must contain non-whitespace characters for investigate-office-duplicate" >&2
              exit 1
            fi
            ARGS=( --name "$NAME1" )
            if [ -n "$NAME2" ]; then ARGS+=( --name "$NAME2" ); fi
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "cleanup-office-name" ]; then
            if [[ ! "$FROM_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: from_name must contain non-whitespace characters" >&2
              exit 1
            fi
            if [[ ! "$TO_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: to_name must contain non-whitespace characters" >&2
              exit 1
            fi
            ARGS=( --from "$FROM_NAME" --to "$TO_NAME" )
            if [ "$DELETE_FROM_MASTER" = "true" ]; then
              ARGS+=( --delete-from-master )
            fi
            if [ -n "$EXPECTED_COUNT" ]; then
              if ! [[ "$EXPECTED_COUNT" =~ ^[0-9]+$ ]]; then
                echo "ERROR: expected_count must be a non-negative integer (got: \"$EXPECTED_COUNT\")" >&2
                exit 1
              fi
              ARGS+=( --expected-count "$EXPECTED_COUNT" )
            fi
            # SCRIPT_ARGS には --dry-run / --execute が入っている。read -ra で word splitting して array に追加
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "backfill-display-filename" ]; then
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              npx ts-node "${SCRIPT_NAME}.ts" $SCRIPT_ARGS
          else
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" $SCRIPT_ARGS
          fi
