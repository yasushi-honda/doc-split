name: Run Operations Script

# 運用スクリプト汎用ワークフロー
# check-master-data, fix-stuck-documents 等のFirestoreアクセスが必要なスクリプトを
# GitHub Actions経由で実行する。ローカルADC不要。
#
# 環境別SA: GCP_SA_KEY_KANAMEONE / GCP_SA_KEY_DEV / GCP_SA_KEY(cocoro、将来GCP_SA_KEY_COCOROに移行)

on:
  # 注: workflow_dispatch.inputs は GitHub Actions の仕様上 25 個まで定義可能
  # (2025-12-04 拡張、それ以前は 10 個上限)。現在 15 個使用中（environment / script /
  # doc_id / file_name / name1 / name2 / from_name / to_name / delete_from_master /
  # expected_count / exec_args_json / survey_artifact_run_id / delete_ids /
  # office_names / office_ids）、残り 10。
  # スクリプト固有の引数追加で上限が窮屈になる場合は、共通 inputs を JSON 文字列に
  # 統合する設計（例: script_args_json）への移行を検討。
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - kanameone
          - cocoro
      script:
        description: 'Script to run'
        required: true
        type: choice
        options:
          - check-master-data
          - check-master-data --fix
          - fix-stuck-documents --dry-run
          - fix-stuck-documents
          - fix-stuck-documents --include-errors --dry-run
          - fix-stuck-documents --include-errors
          - fix-stuck-documents --doc-id --dry-run
          - fix-stuck-documents --doc-id
          - backfill-display-filename --dry-run
          - backfill-display-filename
          - backfill-display-filename --force
          - cleanup-duplicates
          - cleanup-duplicates --execute
          - force-reindex --all-drift
          - force-reindex --all-drift --execute
          - force-reindex --doc-id
          - force-reindex --doc-id --execute
          - investigate-office-duplicate
          - audit-short-office-masters
          - audit-short-office-masters --max-length 3
          - audit-short-office-masters --max-length 4
          - delete-office-master --dry-run
          - delete-office-master --execute
          - reset-documents-by-office --dry-run
          - reset-documents-by-office --execute
          - cleanup-office-name --dry-run
          - cleanup-office-name --execute
          - inspect-document --file-name
          - inspect-document --file-name --include-related
          - inspect-document --doc-id
          - inspect-document --doc-id --include-related
          - audit-storage-mismatch
          - audit-storage-mismatch --no-orphans
          - audit-storage-mismatch --no-collisions
          - audit-storage-mismatch --show-creation-times
          - audit-session61-parent-provenance
          - classify-collision-docs
          - setup-collision-fixture --dev
          - setup-collision-fixture --dev --cleanup
          - execute-collision-migration --dry-run
          - execute-collision-migration --execute
          - pdf-feature-survey --source gcs --prefix original/
          - pdf-feature-survey --source gcs --prefix processed/
          - pdf-feature-survey --source gcs --prefix processed/ --limit 200
          - pdf-feature-survey --source gcs --prefix processed/ --expect-filter /CCITTFaxDecode --expect-subtype /Image
          - pdf-feature-survey --source local --paths fixtures/ --expect-filter /CCITTFaxDecode,/JBIG2Decode,/JPXDecode,/DCTDecode --expect-subtype /Image --expect-encrypted
          - cleanup-ambiguous-collision-docs --dry-run
          - cleanup-ambiguous-collision-docs --execute
          - cleanup-ambiguous-collision-docs --seed-dev-fixture
          - cleanup-ambiguous-collision-docs --seed-dev-fixture --seed-violation
          - cleanup-ambiguous-collision-docs --cleanup-fixture
          - verify-pdf-determinism --synthetic
          - verify-pdf-determinism --paths fixtures/simple.pdf,fixtures/with-ccittfaxdecode.pdf,fixtures/with-jbig2decode.pdf,fixtures/with-jpxdecode.pdf,fixtures/with-dctdecode.pdf,fixtures/encrypted.pdf
          - seed-dev-data --dry-run
          - seed-dev-data
          - seed-dev-data --force-pending
          - check-gemini-cost-stats
          - check-gemini-cost-stats --days 3 --doc-limit 30
          - check-gemini-cost-stats --days 21 --doc-limit 500
          - measure-field-byte-sizes
          - measure-field-byte-sizes --limit 300
          - measure-split-into-length
          - compare-gemini-ocr-models
          - spike-candidate-extraction
          - verify-candidate-extraction-document-level
          - compare-ocr-arbitration-logic
          - compare-ocr-arbitration-logic-confirmed --limit 30
          - compare-ocr-arbitration-logic-confirmed --limit 300
          - compare-gemini-ocr-models-confirmed --limit 30
          - compare-gemini-ocr-models-confirmed --limit 300
          - compare-gemini-ocr-models-confirmed --limit 5000
          - diagnose-confirmed-replay-sampling
          - diagnose-confirmed-replay-sampling --doc-id
          - backfill-detail-subcollection --audit
          - backfill-detail-subcollection --dry-run
          - backfill-detail-subcollection --execute --limit 10
          - backfill-detail-subcollection --execute
          - backfill-detail-subcollection --verify
          - measure-summary-cost --doc-id
          - create-pending-doc --doc-id --storage-path original/seed_generic_12p.pdf
          - delete-legacy-ocr-fields --mark-preflight
          - delete-legacy-ocr-fields --dry-run
          - delete-legacy-ocr-fields --execute --limit 10
          - delete-legacy-ocr-fields --execute
          - delete-legacy-ocr-fields --verify
          - delete-legacy-ocr-fields --rollback
          - diagnose-caremanager-group-gap
          - migrate-document-groups --backfill-cm-unassigned --dry-run
          - migrate-document-groups --backfill-cm-unassigned
      doc_id:
        description: 'Document ID (required when script contains --doc-id; ignored otherwise)'
        required: false
        type: string
        default: ''
      file_name:
        description: 'fileName (required when script contains "inspect-document --file-name"; ignored otherwise)'
        required: false
        type: string
        default: ''
      name1:
        description: 'Office name 1 (required for investigate-office-duplicate; ignored otherwise)'
        required: false
        type: string
        default: ''
      name2:
        description: 'Office name 2 (optional, for paired comparison; e.g. duplicate candidate variant like the trailing-zero suffix case)'
        required: false
        type: string
        default: ''
      from_name:
        description: 'cleanup-office-name: 書き換え元の事業所名（例: ケア21上飯田0）'
        required: false
        type: string
        default: ''
      to_name:
        description: 'cleanup-office-name: 書き換え先の事業所名（例: ケア21上飯田）'
        required: false
        type: string
        default: ''
      delete_from_master:
        description: 'cleanup-office-name: 旧マスターを削除するか（true で削除）'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      expected_count:
        description: 'cleanup-office-name / delete-office-master / reset-documents-by-office: 影響件数の事前確認（数値；省略時はチェック無効、指定時は不一致で中断）'
        required: false
        type: string
        default: ''
      delete_ids:
        description: 'delete-office-master: 削除対象 master id (CSV、例: 6umj52B2r7pYLYWJjPx8,ケア,ニック)'
        required: false
        type: string
        default: ''
      office_names:
        description: 'reset-documents-by-office: 対象 officeName (CSV、例: ケア,ニック)'
        required: false
        type: string
        default: ''
      office_ids:
        description: 'reset-documents-by-office: 対象 officeId (CSV、例: 6umj52B2r7pYLYWJjPx8,ケア,ニック)'
        required: false
        type: string
        default: ''
      exec_args_json:
        description: 'execute-collision-migration: JSON {"planRunId":"<classify run id>","approvedOperationIds":["op-0001",...]}'
        required: false
        type: string
        default: ''
      survey_artifact_run_id:
        description: 'classify-collision-docs: 前段 pdf-feature-survey workflow run ID (PR-C3c AC15-1 必須、数値のみ)'
        required: false
        type: string
        default: ''
      marked_by:
        description: 'delete-legacy-ocr-fields --mark-preflight: 記録者名 (監査証跡、必須)'
        required: false
        type: string
        default: ''
      run_id_for_rollback:
        description: 'delete-legacy-ocr-fields --rollback: 対象のrun-id (--execute実行結果ログに表示される値)'
        required: false
        type: string
        default: ''

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (firebase-admin)
        working-directory: ./functions
        run: npm ci

      - name: Build functions (for scripts that require compiled lib/ — e.g. force-reindex)
        working-directory: ./functions
        run: npm run build

      - name: Install scripts devDependencies (ts-node for .ts scripts)
        working-directory: ./scripts
        run: npm install --no-audit --no-fund

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: |-
            ${{ github.event.inputs.environment == 'kanameone' && secrets.GCP_SA_KEY_KANAMEONE ||
                github.event.inputs.environment == 'dev' && secrets.GCP_SA_KEY_DEV ||
                secrets.GCP_SA_KEY }}

      - name: Resolve project ID and storage bucket
        id: resolve
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: |
          set -euo pipefail
          PROJECT_ID=$(node scripts/helpers/firebaserc-helper.js get-project "$ENVIRONMENT")
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved project_id: $ENVIRONMENT → $PROJECT_ID"

          # CLAUDE.md「Storage バケット名」: .appspot.com / .firebasestorage.app 混在で
          # projectId からの推測禁止。scripts/clients/<env>.env の STORAGE_BUCKET を抽出する。
          # ENVIRONMENT は workflow_dispatch.choice で固定 enum (dev / kanameone / cocoro)、
          # path traversal リスクなし。
          ENV_FILE="scripts/clients/${ENVIRONMENT}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: $ENV_FILE not found" >&2
            exit 1
          fi
          STORAGE_BUCKET=$(grep -E '^STORAGE_BUCKET=' "$ENV_FILE" | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
          if [ -z "$STORAGE_BUCKET" ]; then
            echo "ERROR: STORAGE_BUCKET not found in $ENV_FILE" >&2
            exit 1
          fi
          echo "storage_bucket=$STORAGE_BUCKET" >> "$GITHUB_OUTPUT"
          echo "Resolved storage_bucket: $STORAGE_BUCKET"

      - name: Parse script and args
        id: parse
        env:
          INPUT: ${{ github.event.inputs.script }}
          DOC_ID: ${{ github.event.inputs.doc_id }}
        run: |
          set -euo pipefail
          SCRIPT_NAME=$(echo "$INPUT" | awk '{print $1}')
          SCRIPT_ARGS=$(echo "$INPUT" | sed 's/^[^ ]* *//')
          if [ "$SCRIPT_ARGS" = "$SCRIPT_NAME" ]; then
            SCRIPT_ARGS=""
          fi

          # --doc-id 指定スクリプトには doc_id 入力を必須化
          if echo "$SCRIPT_ARGS" | grep -q -- '--doc-id'; then
            if [ -z "$DOC_ID" ]; then
              echo "ERROR: doc_id input is required when script contains --doc-id" >&2
              exit 1
            fi
            # ドキュメントIDは英数字のみ許可（コマンドインジェクション対策）
            if ! echo "$DOC_ID" | grep -qE '^[A-Za-z0-9_-]+$'; then
              echo "ERROR: doc_id must contain only alphanumeric, underscore, hyphen characters" >&2
              exit 1
            fi
            SCRIPT_ARGS=$(echo "$SCRIPT_ARGS" | sed "s/--doc-id/--doc-id $DOC_ID/")
          fi

          echo "script_name=$SCRIPT_NAME" >> "$GITHUB_OUTPUT"
          echo "script_args=$SCRIPT_ARGS" >> "$GITHUB_OUTPUT"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"

      - name: Parse execute-collision-migration args
        # Issue #432 PR-C2-execution: exec_args_json から planRunId と
        # approvedOperationIds を抽出する。後段の Download artifact + Generate
        # approval JSON で参照。
        id: parse_exec
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        env:
          EXEC_ARGS_JSON: ${{ github.event.inputs.exec_args_json }}
          SCRIPT_NAME: ${{ steps.parse.outputs.script_name }}
        run: |
          set -euo pipefail
          if [ -z "$EXEC_ARGS_JSON" ]; then
            echo "ERROR: exec_args_json is required when script is execute-collision-migration" >&2
            exit 1
          fi
          # JSON validate + 抽出 (jq は ubuntu-latest に標準搭載)
          if ! echo "$EXEC_ARGS_JSON" | jq empty 2>/dev/null; then
            echo "ERROR: exec_args_json is not valid JSON" >&2
            exit 1
          fi
          PLAN_RUN_ID=$(echo "$EXEC_ARGS_JSON" | jq -r '.planRunId // empty')
          OPERATION_IDS=$(echo "$EXEC_ARGS_JSON" | jq -r '.approvedOperationIds // empty | join(",")')
          if [ -z "$PLAN_RUN_ID" ] || [ -z "$OPERATION_IDS" ]; then
            echo "ERROR: exec_args_json must contain planRunId (string) and approvedOperationIds (array)" >&2
            exit 1
          fi
          # planRunId は GitHub Actions run id (数字のみ) — path traversal / injection 防止
          if ! echo "$PLAN_RUN_ID" | grep -qE '^[0-9]+$'; then
            echo "ERROR: planRunId must be a numeric run id (got: $PLAN_RUN_ID)" >&2
            exit 1
          fi
          # operationId は op-NNNN 形式のみ許可
          if ! echo "$OPERATION_IDS" | grep -qE '^op-[0-9]+(,op-[0-9]+)*$'; then
            echo "ERROR: approvedOperationIds must each match ^op-[0-9]+$ (got: $OPERATION_IDS)" >&2
            exit 1
          fi
          echo "plan_run_id=$PLAN_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "operation_ids_csv=$OPERATION_IDS" >> "$GITHUB_OUTPUT"
          echo "Plan run id: $PLAN_RUN_ID"
          echo "Approved operation ids: $OPERATION_IDS"

      - name: Download classify-collision-docs plan artifact
        # exec_args_json.planRunId で指定された前段 classify run の plan-output.json を取得。
        # Artifact 名は upload 側 (上記 Upload step) と一致させる。
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        uses: actions/download-artifact@v4
        with:
          name: classify-collision-docs-plan-${{ github.event.inputs.environment }}-${{ steps.parse_exec.outputs.plan_run_id }}
          path: ${{ github.workspace }}/.exec-plan
          run-id: ${{ steps.parse_exec.outputs.plan_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate survey_artifact_run_id (for classify-collision-docs)
        # PR-C3c (AC15-1): classify-collision-docs は --survey-artifact 必須化されたため、
        # 前段 pdf-feature-survey の workflow run ID を入力で受け取る。run-id は数値のみ許可
        # (path traversal / injection 防止)。
        if: ${{ github.event.inputs.script == 'classify-collision-docs' }}
        env:
          SURVEY_RUN_ID: ${{ github.event.inputs.survey_artifact_run_id }}
        run: |
          set -euo pipefail
          if [ -z "$SURVEY_RUN_ID" ]; then
            echo "ERROR: survey_artifact_run_id is required for classify-collision-docs (PR-C3c AC15-1)" >&2
            exit 1
          fi
          if ! [[ "$SURVEY_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: survey_artifact_run_id must be numeric run ID (got: \"$SURVEY_RUN_ID\")" >&2
            exit 1
          fi
          echo "survey_artifact_run_id validated: $SURVEY_RUN_ID"

      - name: Download pdf-feature-survey artifact (for classify-collision-docs)
        # PR-C3c (AC15-1): classify は前段 pdf-feature-survey run の output JSON を必須入力
        # として読む (--survey-artifact 引数で渡す)。Artifact 名は survey 側 upload と一致。
        if: ${{ github.event.inputs.script == 'classify-collision-docs' }}
        uses: actions/download-artifact@v4
        with:
          name: pdf-feature-survey-${{ github.event.inputs.environment }}-${{ github.event.inputs.survey_artifact_run_id }}
          path: ${{ github.workspace }}/.survey-artifact
          run-id: ${{ github.event.inputs.survey_artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate approval JSON from plan + approved operation ids
        # plan-output.json の operations 配列から approvedOperationIds に該当する op を
        # 抽出し、その planId + opIds + (sourcePath/destPath を gs://bucket/path で展開) を
        # approval.json に書き出す。execute-collision-migration.ts の Gate 1-3 を満たす形式。
        if: ${{ startsWith(github.event.inputs.script, 'execute-collision-migration') }}
        env:
          OPERATION_IDS_CSV: ${{ steps.parse_exec.outputs.operation_ids_csv }}
          STORAGE_BUCKET: ${{ steps.resolve.outputs.storage_bucket }}
        run: |
          set -euo pipefail
          PLAN_FILE="${GITHUB_WORKSPACE}/.exec-plan/plan-output.json"
          APPROVAL_FILE="${GITHUB_WORKSPACE}/.exec-plan/approval.json"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "ERROR: plan-output.json not found at $PLAN_FILE" >&2
            exit 1
          fi
          # CSV → JSON array of strings
          OP_IDS_JSON=$(echo "$OPERATION_IDS_CSV" | jq -R 'split(",")')
          # planId は plan から、approvedPaths は該当 op の sourcePath/destPath を gs:// 形式で集合化
          jq --argjson opids "$OP_IDS_JSON" --arg bucket "$STORAGE_BUCKET" '
            {
              planId: .planId,
              approvedOperationIds: $opids,
              approvedPaths: [
                .operations[]
                | select(.operationId as $id | $opids | index($id))
                | (.sourcePath, .destPath)
                | select(. != null and . != "")
                | "gs://\($bucket)/\(.)"
              ] | unique
            }
          ' "$PLAN_FILE" > "$APPROVAL_FILE"
          # 確認用 (path をログに出すことで監査証跡を残す)
          echo "=== Generated approval.json ==="
          cat "$APPROVAL_FILE"
          echo "==============================="
          # approvedOperationIds の数 = 入力 opId 数 を検証 (plan に存在しない opId は警告)
          INPUT_COUNT=$(echo "$OP_IDS_JSON" | jq 'length')
          MATCHED_COUNT=$(jq '[.operations[] | select(.operationId as $id | ('"$OP_IDS_JSON"' | index($id))) ] | length' "$PLAN_FILE")
          if [ "$INPUT_COUNT" != "$MATCHED_COUNT" ]; then
            echo "ERROR: $INPUT_COUNT operation ids requested but only $MATCHED_COUNT matched in plan" >&2
            exit 1
          fi

      - name: Run script
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          PROJECT_ID: ${{ steps.resolve.outputs.project_id }}
          SCRIPT_NAME: ${{ steps.parse.outputs.script_name }}
          SCRIPT_ARGS: ${{ steps.parse.outputs.script_args }}
          NAME1: ${{ github.event.inputs.name1 }}
          NAME2: ${{ github.event.inputs.name2 }}
          FROM_NAME: ${{ github.event.inputs.from_name }}
          TO_NAME: ${{ github.event.inputs.to_name }}
          DELETE_FROM_MASTER: ${{ github.event.inputs.delete_from_master }}
          EXPECTED_COUNT: ${{ github.event.inputs.expected_count }}
          FILE_NAME: ${{ github.event.inputs.file_name }}
          DOC_ID: ${{ github.event.inputs.doc_id }}
          STORAGE_BUCKET: ${{ steps.resolve.outputs.storage_bucket }}
          OPERATION_IDS_CSV: ${{ steps.parse_exec.outputs.operation_ids_csv }}
          DELETE_IDS: ${{ github.event.inputs.delete_ids }}
          OFFICE_NAMES: ${{ github.event.inputs.office_names }}
          OFFICE_IDS: ${{ github.event.inputs.office_ids }}
          MARKED_BY: ${{ github.event.inputs.marked_by }}
          RUN_ID_FOR_ROLLBACK: ${{ github.event.inputs.run_id_for_rollback }}
        run: |
          set -euo pipefail
          if [ -z "$PROJECT_ID" ]; then
            echo "ERROR: PROJECT_ID is empty (failed to resolve from .firebaserc)" >&2
            exit 1
          fi
          echo "=== Operations Script ==="
          echo "Environment: $ENVIRONMENT"
          echo "Project ID: $PROJECT_ID"
          echo "Script: $SCRIPT_NAME"
          echo "Args: $SCRIPT_ARGS"
          echo "========================="

          if [ "$SCRIPT_NAME" = "investigate-office-duplicate" ]; then
            # 空文字 / 空白のみの NAME1 を弾く（trim せずに非空白文字の存在チェック）
            if [[ ! "$NAME1" =~ [^[:space:]] ]]; then
              echo "ERROR: name1 must contain non-whitespace characters for investigate-office-duplicate" >&2
              exit 1
            fi
            ARGS=( --name "$NAME1" )
            if [ -n "$NAME2" ]; then ARGS+=( --name "$NAME2" ); fi
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "delete-office-master" ]; then
            # delete_ids (CSV) を --id 引数列に展開 (Issue #504)
            if [ -z "${DELETE_IDS:-}" ]; then
              echo "ERROR: delete_ids input is required for delete-office-master" >&2
              exit 1
            fi
            ARGS=()
            IFS=',' read -ra ID_ARR <<< "$DELETE_IDS"
            for id in "${ID_ARR[@]}"; do
              if [[ ! "$id" =~ [^[:space:]] ]]; then
                continue
              fi
              # 「--」で始まる値は引数として誤解釈されるリスクがあるため reject (PR #505 review I3)
              if [[ "$id" == --* ]]; then
                echo "ERROR: delete_ids 値が '--' で始まるためreject: \"$id\"" >&2
                exit 1
              fi
              ARGS+=( --id "$id" )
            done
            if [ ${#ARGS[@]} -eq 0 ]; then
              echo "ERROR: delete_ids did not yield any non-empty id" >&2
              exit 1
            fi
            if [ -n "$EXPECTED_COUNT" ]; then
              if ! [[ "$EXPECTED_COUNT" =~ ^[0-9]+$ ]]; then
                echo "ERROR: expected_count must be a non-negative integer (got: \"$EXPECTED_COUNT\")" >&2
                exit 1
              fi
              ARGS+=( --expected-count "$EXPECTED_COUNT" )
            fi
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "reset-documents-by-office" ]; then
            # office_names / office_ids (CSV) を --office-name / --office-id 引数列に展開 (Issue #504)
            # 「--」で始まる値は引数として誤解釈されるリスクがあるため reject (PR #505 review I3)
            ARGS=()
            if [ -n "${OFFICE_NAMES:-}" ]; then
              IFS=',' read -ra NAME_ARR <<< "$OFFICE_NAMES"
              for name in "${NAME_ARR[@]}"; do
                if [[ ! "$name" =~ [^[:space:]] ]]; then continue; fi
                if [[ "$name" == --* ]]; then
                  echo "ERROR: office_names 値が '--' で始まるためreject: \"$name\"" >&2
                  exit 1
                fi
                ARGS+=( --office-name "$name" )
              done
            fi
            if [ -n "${OFFICE_IDS:-}" ]; then
              IFS=',' read -ra OID_ARR <<< "$OFFICE_IDS"
              for oid in "${OID_ARR[@]}"; do
                if [[ ! "$oid" =~ [^[:space:]] ]]; then continue; fi
                if [[ "$oid" == --* ]]; then
                  echo "ERROR: office_ids 値が '--' で始まるためreject: \"$oid\"" >&2
                  exit 1
                fi
                ARGS+=( --office-id "$oid" )
              done
            fi
            if [ ${#ARGS[@]} -eq 0 ]; then
              echo "ERROR: office_names または office_ids のいずれかに非空値を指定してください" >&2
              exit 1
            fi
            if [ -n "$EXPECTED_COUNT" ]; then
              if ! [[ "$EXPECTED_COUNT" =~ ^[0-9]+$ ]]; then
                echo "ERROR: expected_count must be a non-negative integer (got: \"$EXPECTED_COUNT\")" >&2
                exit 1
              fi
              ARGS+=( --expected-count "$EXPECTED_COUNT" )
            fi
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "cleanup-office-name" ]; then
            if [[ ! "$FROM_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: from_name must contain non-whitespace characters" >&2
              exit 1
            fi
            if [[ ! "$TO_NAME" =~ [^[:space:]] ]]; then
              echo "ERROR: to_name must contain non-whitespace characters" >&2
              exit 1
            fi
            ARGS=( --from "$FROM_NAME" --to "$TO_NAME" )
            if [ "$DELETE_FROM_MASTER" = "true" ]; then
              ARGS+=( --delete-from-master )
            fi
            if [ -n "$EXPECTED_COUNT" ]; then
              if ! [[ "$EXPECTED_COUNT" =~ ^[0-9]+$ ]]; then
                echo "ERROR: expected_count must be a non-negative integer (got: \"$EXPECTED_COUNT\")" >&2
                exit 1
              fi
              ARGS+=( --expected-count "$EXPECTED_COUNT" )
            fi
            # SCRIPT_ARGS には --dry-run / --execute が入っている。read -ra で word splitting して array に追加
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "delete-legacy-ocr-fields" ]; then
            # ADR-0018 Phase E (Issue #547)。--mark-preflight は marked_by 必須、
            # --rollback は run_id_for_rollback 必須。それ以外(--dry-run/--execute/--verify)は
            # SCRIPT_ARGS (--limit N 含む) をそのまま渡す。functions/src/ocr/ocrExcerpt.ts等には
            # 依存しないが、他のTypeScriptスクリプトと同様 ts-node 経由で統一実行する。
            ARGS=()
            read -ra SUFFIX_ARGS <<< "$SCRIPT_ARGS"
            ARGS+=( "${SUFFIX_ARGS[@]}" )
            if echo "$SCRIPT_ARGS" | grep -q -- '--mark-preflight'; then
              if [[ ! "$MARKED_BY" =~ [^[:space:]] ]]; then
                echo "ERROR: marked_by input is required for --mark-preflight (監査証跡)" >&2
                exit 1
              fi
              ARGS+=( --marked-by "$MARKED_BY" )
            fi
            if echo "$SCRIPT_ARGS" | grep -q -- '--rollback'; then
              if [[ ! "$RUN_ID_FOR_ROLLBACK" =~ [^[:space:]] ]]; then
                echo "ERROR: run_id_for_rollback input is required for --rollback" >&2
                exit 1
              fi
              ARGS+=( --run-id "$RUN_ID_FOR_ROLLBACK" )
            fi
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              npx ts-node "${SCRIPT_NAME}.ts" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "execute-collision-migration" ]; then
            # Issue #432 PR-C2-execution: plan + approval を前段 step で artifact 取得 + 生成。
            # SCRIPT_ARGS は workflow_dispatch の choice に応じて "--dry-run" or "--execute"。
            # --operations で approvedOperationIds に対象を限定 (plan 内の他 op を gate-rejected で
            # exit 1 にしないため。approvedOperationIds に対する二重 filter で安全側)。
            if [ -z "${OPERATION_IDS_CSV:-}" ]; then
              echo "ERROR: operation_ids_csv is empty (should be set by Parse exec args step)" >&2
              exit 1
            fi
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              npx ts-node "${SCRIPT_NAME}.ts" \
                --plan "${GITHUB_WORKSPACE}/.exec-plan/plan-output.json" \
                --approval "${GITHUB_WORKSPACE}/.exec-plan/approval.json" \
                --operations "$OPERATION_IDS_CSV" \
                $SCRIPT_ARGS
          elif [ "$SCRIPT_NAME" = "backfill-display-filename" ] || \
               [ "$SCRIPT_NAME" = "classify-collision-docs" ] || \
               [ "$SCRIPT_NAME" = "setup-collision-fixture" ] || \
               [ "$SCRIPT_NAME" = "pdf-feature-survey" ] || \
               [ "$SCRIPT_NAME" = "verify-pdf-determinism" ] || \
               [ "$SCRIPT_NAME" = "seed-dev-data" ] || \
               [ "$SCRIPT_NAME" = "compare-gemini-ocr-models" ] || \
               [ "$SCRIPT_NAME" = "spike-candidate-extraction" ] || \
               [ "$SCRIPT_NAME" = "verify-candidate-extraction-document-level" ] || \
               [ "$SCRIPT_NAME" = "compare-ocr-arbitration-logic" ] || \
               [ "$SCRIPT_NAME" = "compare-ocr-arbitration-logic-confirmed" ] || \
               [ "$SCRIPT_NAME" = "compare-gemini-ocr-models-confirmed" ] || \
               [ "$SCRIPT_NAME" = "diagnose-confirmed-replay-sampling" ] || \
               [ "$SCRIPT_NAME" = "backfill-detail-subcollection" ] || \
               [ "$SCRIPT_NAME" = "measure-summary-cost" ] || \
               [ "$SCRIPT_NAME" = "create-pending-doc" ]; then
            # Issue #432 PR-C 系 script は scripts/lib/* (TypeScript)、seed-dev-data (#528) は
            # shared/*.ts に依存するため ts-node 経由で実行。compare-gemini-ocr-models (#548) は
            # functions/src/utils/* (extractors.ts/retry.ts) に依存するため同様に ts-node 経由。
            # compare-gemini-ocr-models-confirmed (#548 confirmed replay方式) も同様の依存関係。
            # spike-candidate-extraction (OCR突合精度向上ミッション タスクA) も同様に
            # functions/src/utils/* + scripts/lib/geminiOcrCompare.ts に依存する。
            # verify-candidate-extraction-document-level (同ミッション タスクB) も同様に加え
            # functions/src/ocr/ocrProcessor.ts の extractOcrCandidates() に依存する
            # (admin.initializeApp()後の動的importで解決、measure-summary-costと同パターン)。
            # compare-ocr-arbitration-logic (同ミッション タスクF) も同様の依存関係に加え
            # scripts/fixtures/arbitrationCompareFixtures.ts / scripts/lib/ocrLogicCompareStats.ts
            # に依存する。STORAGE_BUCKET は未使用(ローカルfixture読込のみ、Storageアクセスなし)だが
            # 本分岐の他スクリプトと統一的に環境変数を渡す。
            # compare-ocr-arbitration-logic-confirmed (同ミッション タスクH) は
            # compare-ocr-arbitration-logic のロジックA/B比較軸と compare-gemini-ocr-models-confirmed
            # のconfirmed replayサンプリング/read-only/個人情報保護パターンを組み合わせたもの。
            # kanameone/cocoro環境専用(customerConfirmed/officeConfirmedを持つ本番データが必要)。
            # scripts/lib/confirmedArbitrationStats.ts に依存する。STORAGE_BUCKETを使用する。
            # diagnose-confirmed-replay-sampling (#548 pilot実行0件原因調査用) は firebase-admin
            # のみ依存(functions/src非依存、STORAGE_BUCKET不使用)だが統一的にts-node経由で実行。
            # measure-summary-cost (#562) は functions/src/ocr/summaryGenerator.ts に依存するため同様。
            # backfill-detail-subcollection (#547 ADR-0018 Phase C) は
            # functions/src/ocr/ocrExcerpt.ts + scripts/lib/* に依存するため同様。
            # create-pending-doc (#562) はfirebase-adminのみ依存(functions/src非依存)だが、
            # 統一的にscriptsディレクトリからts-node経由で実行する。
            # STORAGE_BUCKET は resolve step で env 化済。
            EXTRA_ARGS=""
            if [ "$SCRIPT_NAME" = "classify-collision-docs" ]; then
              # ログマスキングで `{` が `***` に置換されるため、plan JSON を
              # ファイル出力 → upload-artifact で取得する経路を必須化。
              # workflow_dispatch の choice には --out を含めず、ここで強制付与する。
              # PR-C3c (AC15-1): --survey-artifact を前段 pdf-feature-survey artifact から取得した
              # ファイルパスで自動付与。Download pdf-feature-survey artifact step が
              # ${GITHUB_WORKSPACE}/.survey-artifact/pdf-feature-survey-output.json に展開済。
              EXTRA_ARGS="--out ${GITHUB_WORKSPACE}/scripts/plan-output.json --survey-artifact ${GITHUB_WORKSPACE}/.survey-artifact/pdf-feature-survey-output.json"
            elif [ "$SCRIPT_NAME" = "pdf-feature-survey" ]; then
              # Issue #432 PR-C3a: survey 結果も JSON で artifact 化する (log secret masking 回避)。
              EXTRA_ARGS="--out ${GITHUB_WORKSPACE}/scripts/pdf-feature-survey-output.json"
            elif [ "$SCRIPT_NAME" = "verify-pdf-determinism" ]; then
              # Issue #432 PR-C3a: determinism verdict も JSON で artifact 化する。
              EXTRA_ARGS="--out ${GITHUB_WORKSPACE}/scripts/verify-pdf-determinism-output.json"
            fi
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              npx ts-node "${SCRIPT_NAME}.ts" $SCRIPT_ARGS $EXTRA_ARGS
          elif [ "$SCRIPT_NAME" = "cleanup-ambiguous-collision-docs" ]; then
            # Issue #492: Ambiguous collision docs cleanup。scripts/lib/* (TypeScript)
            # 依存のため ts-node 経由。plan は projectId から scripts/plans/ 配下を
            # 自動選択 (plan.projectId と FIREBASE_PROJECT_ID の二重照合あり)。
            # バックアップ JSON は log secret masking 回避のため artifact 経由で取得。
            cd scripts
            NODE_PATH=../functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              npx ts-node "${SCRIPT_NAME}.ts" $SCRIPT_ARGS \
                --backup-out "${GITHUB_WORKSPACE}/scripts/cleanup-ambiguous-backup.json"
          elif [ "$SCRIPT_NAME" = "inspect-document" ]; then
            # SCRIPT_ARGS は workflow_dispatch で選んだ "--file-name" / "--doc-id" / "... --include-related"
            # FILE_NAME / DOC_ID は env 経由で受け取り、配列に積んで execv 渡しでシェル展開を経由しない
            ARGS=()
            INCLUDE_RELATED=0
            if echo "$SCRIPT_ARGS" | grep -q -- '--include-related'; then
              INCLUDE_RELATED=1
            fi
            if echo "$SCRIPT_ARGS" | grep -q -- '--file-name'; then
              if [[ ! "$FILE_NAME" =~ [^[:space:]] ]]; then
                echo "ERROR: file_name input is required when script contains --file-name" >&2
                exit 1
              fi
              ARGS+=( --file-name "$FILE_NAME" )
            fi
            if echo "$SCRIPT_ARGS" | grep -q -- '--doc-id'; then
              # parse 段階で DOC_ID validation 済み (英数字_-)、SCRIPT_ARGS 側は "--doc-id <DOC_ID>" の形
              # ARGS には DOC_ID を直接入れる（execv 経由でシェル展開されない）
              if [ -z "${DOC_ID:-}" ]; then
                echo "ERROR: doc_id input is required when script contains --doc-id" >&2
                exit 1
              fi
              ARGS+=( --doc-id "$DOC_ID" )
            fi
            if [ "$INCLUDE_RELATED" = "1" ]; then
              ARGS+=( --include-related )
            fi
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" "${ARGS[@]}"
          elif [ "$SCRIPT_NAME" = "audit-session61-parent-provenance" ]; then
            # Issue #432 PR-C2-execution post-audit: log secret masking で `{` が
            # 置換されると JSON 再構成不能のため、artifact 経由で報告書を渡す。
            # workflow_dispatch の choice には --out を含めず、ここで強制付与する。
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              STORAGE_BUCKET="$STORAGE_BUCKET" \
              node "scripts/${SCRIPT_NAME}.js" \
                --out "${GITHUB_WORKSPACE}/scripts/audit-session61-parent-provenance-output.json"
          else
            NODE_PATH=./functions/node_modules \
              FIREBASE_PROJECT_ID="$PROJECT_ID" \
              node "scripts/${SCRIPT_NAME}.js" $SCRIPT_ARGS
          fi

      - name: Upload classify-collision-docs plan artifact
        # Issue #432 PR-C2-execution: log の secret masking で `{` → `***` 置換で plan JSON
        # を log から再構成できないため、artifact 経由で受け渡す。classify-collision-docs
        # 実行時のみ動作 (Run script step で `--out` を強制付与した出力ファイル)。
        if: ${{ github.event.inputs.script == 'classify-collision-docs' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: classify-collision-docs-plan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/plan-output.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload pdf-feature-survey report artifact
        # Issue #432 PR-C3a: PDF feature 分布調査の survey JSON を artifact 経由で取得。
        # 入力 script は "pdf-feature-survey --source gcs --prefix processed/" 等の引数付き
        # 文字列のため startsWith で判定する。
        if: ${{ startsWith(github.event.inputs.script, 'pdf-feature-survey') && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pdf-feature-survey-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/pdf-feature-survey-output.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload verify-pdf-determinism report artifact
        # Issue #432 PR-C3a: cross-process invariance 検証結果を artifact 経由で取得。
        # 入力 script は "verify-pdf-determinism --synthetic" 等の引数付き文字列のため
        # startsWith で判定する。
        if: ${{ startsWith(github.event.inputs.script, 'verify-pdf-determinism') && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: verify-pdf-determinism-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/verify-pdf-determinism-output.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload cleanup-ambiguous backup artifact
        # Issue #492: 削除前バックアップ (winner 含む全対象 doc スナップショット)。
        # destructive 操作の復旧材料のため retention を長めに取る。
        # dry-run でも出力されるためレビュー材料としても使える。
        if: ${{ startsWith(github.event.inputs.script, 'cleanup-ambiguous-collision-docs') && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-ambiguous-backup-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/cleanup-ambiguous-backup.json
          # fixture 系 run では backup が出ないため error にはしないが、
          # --execute run で backup 不在なら気付けるよう warn (ignore は復旧材料の
          # 消失を無音化するため不可 — silent-failure review 反映)
          if-no-files-found: warn
          retention-days: 90

      - name: Upload audit-session61-parent-provenance report artifact
        # Issue #432 PR-C2-execution post-audit: log secret masking 回避のため
        # 報告書を artifact 経由で取得。audit-session61-parent-provenance 実行時のみ動作。
        if: ${{ github.event.inputs.script == 'audit-session61-parent-provenance' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: audit-session61-parent-provenance-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: scripts/audit-session61-parent-provenance-output.json
          if-no-files-found: warn
          retention-days: 30
